<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş | Azman Holding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .gold-gradient { background: linear-gradient(135deg, #C9A227 0%, #E8D48B 50%, #C9A227 100%); }
        .glass-effect { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Decorative elements -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-yellow-500/5 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-yellow-500/5 rounded-full translate-x-1/2 translate-y-1/2"></div>
    <div class="absolute top-1/4 right-1/4 w-2 h-2 bg-yellow-500/20 rounded-full"></div>
    <div class="absolute bottom-1/3 left-1/4 w-3 h-3 bg-yellow-500/10 rounded-full"></div>

    <div class="glass-effect rounded-2xl shadow-2xl p-8 w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gray-900 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-crown text-yellow-500 text-3xl"></i>
            </div>
            <div class="w-24 h-1 bg-yellow-500 mx-auto mb-4"></div>
            <h1 class="text-2xl font-bold text-gray-800">Azman Holding</h1>
            <p class="text-gray-500 mt-2">Sistemə daxil olun</p>
        </div>
        
        <form action="/auth/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-600"
                       placeholder="email@example.com">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Şifrə</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-600"
                       placeholder="••••••••">
            </div>
            
            <button type="submit" class="w-full bg-gray-800 text-white py-3 rounded-lg font-medium hover:bg-gray-700 transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Daxil ol
            </button>
        </form>
        
        <div class="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
            <p class="font-medium mb-2">Demo hesablar (şifrə: admin123):</p>
            <p class="text-xs">• admin@azmanholding.az - Admin</p>
            <p class="text-xs">• holding.hr@azmanholding.az - Holding HR</p>
            <p class="text-xs">• hr@azmanconstruction.az - Alt Şirkət HR</p>
        </div>
    </div>
</body>
</html>
