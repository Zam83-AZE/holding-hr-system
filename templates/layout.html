<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} | Azman Holding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-link.active { background-color: #1f2937; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex-shrink-0 flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <h1 class="text-xl font-bold flex items-center">
                    <i class="fas fa-crown mr-2 text-yellow-500"></i>
                    Azman Holding
                </h1>
            </div>
            
            <nav class="flex-1 p-4 space-y-2">
                <a href="/" class="sidebar-link flex items-center px-4 py-2 rounded hover:bg-gray-800 transition {{if eq .Title "Dashboard"}}active{{end}}">
                    <i class="fas fa-home w-5 mr-3"></i>
                    Dashboard
                </a>
                
                <a href="/employees" class="sidebar-link flex items-center px-4 py-2 rounded hover:bg-gray-800 transition {{if eq .Title "Kadr Uçotu"}}active{{end}}">
                    <i class="fas fa-users w-5 mr-3"></i>
                    Kadr Uçotu
                </a>
                
                <a href="/structure" class="sidebar-link flex items-center px-4 py-2 rounded hover:bg-gray-800 transition {{if eq .Title "Struktur"}}active{{end}}">
                    <i class="fas fa-sitemap w-5 mr-3"></i>
                    Struktur
                </a>
                
                {{if eq .User.Role "ADMIN"}}
                <a href="/settings" class="sidebar-link flex items-center px-4 py-2 rounded hover:bg-gray-800 transition {{if eq .Title "Ayarlar"}}active{{end}}">
                    <i class="fas fa-cog w-5 mr-3"></i>
                    Ayarlar
                </a>
                {{end}}
            </nav>
            
            <!-- User info -->
            <div class="p-4 border-t border-gray-800">
                <div class="text-sm">
                    <p class="font-medium">{{.User.Email}}</p>
                    <p class="text-yellow-500 text-xs">{{.User.Role | roleLabel}}</p>
                </div>
                <a href="/auth/logout" class="mt-2 flex items-center text-sm text-yellow-500 hover:text-white">
                    <i class="fas fa-sign-out-alt mr-2"></i>
                    Çıxış
                </a>
            </div>
        </aside>
        
        <!-- Main content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Top bar -->
            <header class="bg-white shadow-sm px-6 py-4 flex items-center justify-between">
                <h2 class="text-xl font-semibold text-gray-800">{{.Title}}</h2>
                
                <!-- Search -->
                <form action="/employee/search" method="GET" class="flex items-center">
                    <input type="text" name="q" placeholder="Axtarış (FİN, Ad, Soyad)..." 
                           class="px-4 py-2 border rounded-l-lg focus:outline-none focus:ring-2 focus:ring-yellow-600 w-64"
                           value="{{.Query}}">
                    <button type="submit" class="px-4 py-2 bg-gray-800 text-white rounded-r-lg hover:bg-gray-700">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </header>
            
            <!-- Page content -->
            <div class="p-6">
                {{template "content" .}}
            </div>
        </main>
    </div>
    
    <script>
        // Sidebar active state
        const currentPath = window.location.pathname;
        document.querySelectorAll('.sidebar-link').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>
