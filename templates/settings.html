<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayarlar | Holding HR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <div class="w-64 bg-blue-900 text-white p-4 flex-shrink-0">
            <h1 class="text-xl font-bold mb-6"><i class="fas fa-building mr-2"></i>Holding HR</h1>
            <nav class="space-y-2">
                <a href="/" class="block px-4 py-2 rounded hover:bg-blue-800">Dashboard</a>
                <a href="/employees" class="block px-4 py-2 rounded hover:bg-blue-800">Kadr Uçotu</a>
                <a href="/structure" class="block px-4 py-2 rounded hover:bg-blue-800">Struktur</a>
                <a href="/settings" class="block px-4 py-2 rounded bg-blue-800">Ayarlar</a>
            </nav>
        </div>
        
        <div class="flex-1 p-6 overflow-auto">
            <div class="mb-6">
                <div class="flex border-b">
                    <a href="/settings" class="px-6 py-3 border-b-2 border-blue-500 text-blue-600 font-medium">Şirkətlər</a>
                    <a href="/settings/users" class="px-6 py-3 text-gray-500 hover:text-gray-700">İstifadəçilər</a>
                </div>
            </div>
            
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Şirkətlərin Siyahısı</h2>
                <button onclick="document.getElementById('companyModal').classList.remove('hidden')" class="bg-blue-600 text-white px-4 py-2 rounded-lg">
                    <i class="fas fa-plus mr-2"></i>Yeni Şirkət
                </button>
            </div>
            
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ad</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">VÖEN</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tip</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ünvan</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        {{range .Companies}}
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 font-medium">{{.Name}}</td>
                            <td class="px-6 py-4 text-gray-500">{{.TaxID}}</td>
                            <td class="px-6 py-4">
                                {{if .IsHolding}}
                                <span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">Holding</span>
                                {{else}}
                                <span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-800">Alt Şirkət</span>
                                {{end}}
                            </td>
                            <td class="px-6 py-4 text-gray-500">{{.Address}}</td>
                        </tr>
                        {{end}}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Add Company Modal -->
    <div id="companyModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">Yeni Şirkət</h3>
            <form action="/settings/company/create" method="POST">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Şirkət Adı *</label>
                        <input type="text" name="name" class="w-full px-3 py-2 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">VÖEN</label>
                        <input type="text" name="tax_id" class="w-full px-3 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Ünvan</label>
                        <input type="text" name="address" class="w-full px-3 py-2 border rounded-lg">
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" name="is_holding" id="isHolding" class="mr-2">
                        <label for="isHolding" class="text-sm">Bu holdinqdir</label>
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="document.getElementById('companyModal').classList.add('hidden')" class="px-4 py-2 border rounded-lg">İmtina</button>
                    <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg">Əlavə Et</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
