<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni İşçi | Azman Holding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50">
    <div class="flex min-h-screen">
        <div class="w-64 bg-white text-gray-700 border-r border-gray-200 p-4 flex-shrink-0">
            <h1 class="text-xl font-bold mb-6"><i class="fas fa-building mr-2 text-blue-600"></i>Azman HR</h1>
            <nav class="space-y-2">
                <a href="/" class="block px-4 py-2 rounded hover:bg-slate-700">Dashboard</a>
                <a href="/employees" class="block px-4 py-2 rounded hover:bg-slate-700">Kadr Uçotu</a>
                <a href="/structure" class="block px-4 py-2 rounded hover:bg-slate-700">Struktur</a>
            </nav>
        </div>

        <div class="flex-1 p-6 overflow-auto">
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-lg shadow p-6">
                    <h2 class="text-xl font-bold mb-6">Yeni Namizəd</h2>

                    <form action="/employee/create" method="POST">
                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Ad *</label>
                                <input type="text" name="first_name" required class="w-full px-3 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Soyad *</label>
                                <input type="text" name="last_name" required class="w-full px-3 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Ata adı</label>
                                <input type="text" name="father_name" class="w-full px-3 py-2 border rounded-lg">
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">FİN Kod *</label>
                                <input type="text" name="fin_code" maxlength="7" required class="w-full px-3 py-2 border rounded-lg uppercase">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Doğum tarixi</label>
                                <input type="date" name="birth_date" class="w-full px-3 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Cins</label>
                                <select name="gender" class="w-full px-3 py-2 border rounded-lg">
                                    <option value="">Seçin</option>
                                    <option value="MALE">Kişi</option>
                                    <option value="FEMALE">Qadın</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                                <input type="text" name="phone" class="w-full px-3 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" name="email" class="w-full px-3 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Şirkət</label>
                                <select name="company_id" required class="w-full px-3 py-2 border rounded-lg">
                                    {{range .Companies}}
                                    <option value="{{.ID}}">{{.Name}}</option>
                                    {{end}}
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ünvan</label>
                            <input type="text" name="address" class="w-full px-3 py-2 border rounded-lg">
                        </div>

                        <div class="flex justify-end space-x-3">
                            <a href="/employees" class="px-4 py-2 border rounded-lg">İmtina</a>
                            <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                                <i class="fas fa-save mr-2"></i>Yadda Saxla
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
