{{define "content"}}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h3 class="text-lg font-semibold text-gray-800 mb-6">
            {{if .IsNew}}Yeni Namizəd Əlavə Et{{else}}İşçi Məlumatlarını Redaktə Et{{end}}
        </h3>
        
        <form action="/employee/create" method="POST">
            <div class="space-y-6">
                <!-- Company Selection -->
                {{if or (eq .User.Role "ADMIN") (eq .User.Role "HOLDING_HR")}}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Şirkət *</label>
                    <select name="company_id" id="companySelect" onchange="loadCompanyData()" 
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        {{range .Companies}}
                        <option value="{{.ID}}" {{if eq $.SelectedCompany .ID}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                {{else}}
                <input type="hidden" name="company_id" value="{{.SelectedCompany}}">
                {{end}}
                
                <!-- Personal Info Section -->
                <div class="border-t pt-6">
                    <h4 class="text-sm font-medium text-gray-500 mb-4">Şəxsi Məlumatlar</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ad *</label>
                            <input type="text" name="first_name" required
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Soyad *</label>
                            <input type="text" name="last_name" required
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ata adı</label>
                            <input type="text" name="father_name"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">FİN Kod *</label>
                            <input type="text" name="fin_code" maxlength="7" required
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Doğum tarixi</label>
                            <input type="date" name="birth_date"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Cins</label>
                            <select name="gender" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">Seçin</option>
                                <option value="MALE">Kişi</option>
                                <option value="FEMALE">Qadın</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Contact Info Section -->
                <div class="border-t pt-6">
                    <h4 class="text-sm font-medium text-gray-500 mb-4">Əlaqə Məlumatları</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Telefon</label>
                            <input type="text" name="phone" placeholder="+994 50 XXX XX XX"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" name="email"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Ünvan</label>
                            <input type="text" name="address"
                                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 flex justify-end space-x-3">
                <a href="/employees?status=CANDIDATE" class="px-6 py-2 border rounded-lg hover:bg-gray-50 transition">
                    İmtina
                </a>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                    <i class="fas fa-save mr-2"></i>
                    Yadda Saxla
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function loadCompanyData() {
    const companyID = document.getElementById('companySelect').value;
    // Could load departments/positions dynamically via AJAX
}
</script>
{{end}}
