services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: holding-hr-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_USER=hruser
      - DB_PASSWORD=hrpass123
      - DB_NAME=holding_hr
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - SERVER_PORT=8080
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./static/uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - hr-network

  mariadb:
    image: mariadb:10.11
    container_name: holding-hr-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass123
      - MYSQL_USER=hruser
      - MYSQL_PASSWORD=hrpass123
      - MYSQL_DATABASE=holding_hr
    ports:
      - "3306:3306"
    volumes:
      - hr-mariadb-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hr-network

  test:
    image: golang:1.21-alpine
    container_name: holding-hr-test
    environment:
      - BASE_URL=http://app:8080
      - REPORT_DIR=/app/test-results
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - .:/app
      - test-results:/app/test-results
    working_dir: /app
    command: >
      sh -c "
        apk add --no-cache curl bash git &&
        echo 'App is healthy, running tests...' &&
        go run tests/integration_runner.go &&
        echo 'Pushing test results to GitHub...' &&
        git config --global --add safe.directory /app &&
        git config --global user.email 'test@holding-hr.local' &&
        git config --global user.name 'Test Runner' &&
        git add test-results/ &&
        git diff --staged --quiet || (git commit -m 'Test results - $(date +%Y-%m-%d_%H-%M-%S)' && git push origin main) &&
        echo 'Done!'
      "
    networks:
      - hr-network

volumes:
  hr-mariadb-data:
  test-results:

networks:
  hr-network:
    driver: bridge
